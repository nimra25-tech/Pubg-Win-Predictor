<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Match Win Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="pubg-wrapper">
    <div class="panel predictor-panel">
        <h1 class="title">DROP INTO <span class="highlight">MIRAMAR</span></h1>
        
        <div class="input-group">
            <label>KILLS: <span id="kills-val" class="highlight">8</span></label>
            <input type="range" id="kills" min="0" max="20" value="8" class="pubg-slider">
        </div>
        
        <div class="input-group">
            <label>DAMAGE DEALT: <span id="dmg-val" class="highlight">808</span></label>
            <input type="range" id="dmg" min="0" max="2000" value="808" class="pubg-slider">
        </div>
        
        <button class="btn-predict">CALCULATE PROBABILITY</button>
    </div>

    <div class="panel analytics-panel">
        <h2 class="section-title">MATCH ANALYTICS</h2>
        <div class="chart-container">
            <canvas id="probabilityChart"></canvas>
        </div>
    </div>
</div>

<div class="panel team-panel">
    <h2 class="section-title">SQUAD ROSTER & EVALUATION</h2>
    <div class="squad-grid">
        
        <div class="squad-member">
            <div class="member-avatar">💻</div>
            <h3>Nimra</h3>
            <p class="role">Lead Developer</p>
            <p class="contribution">Deployment, Logic Integration & UI Implementation</p>
        </div>

        <div class="squad-member">
            <div class="member-avatar">🎨</div>
            <h3>Banin</h3>
            <p class="role">UI/UX Designer</p>
            <p class="contribution">Frontend Design, Sliders & Interactive Elements</p>
        </div>

        <div class="squad-member">
            <div class="member-avatar">📊</div>
            <h3>Mahnoor</h3>
            <p class="role">Data Scientist</p>
            <p class="contribution">Dataset Analysis, Modeling & Statistical Verification</p>
        </div>
        
    </div>
</div>

<script src="script.js"></script>>
</body>
</html>
